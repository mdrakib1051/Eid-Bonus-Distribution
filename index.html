<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Eid Salami 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-[#022c22] text-white min-h-screen font-['Hind_Siliguri']">

    <div class="max-w-md mx-auto px-6 py-10">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-yellow-400 drop-shadow-lg mb-2">🌙 ঈদ সেলামি ২০২৬</h1>
            <p class="text-emerald-200 opacity-80 uppercase tracking-widest text-[10px]">Digital Salami Distribution System</p>
        </div>

        <div id="main-stage" class="relative">
            <div id="setup-box" class="glass-card p-8 rounded-[30px] border border-white/10 text-center shadow-2xl">
                <div class="mb-6">
                    <div class="text-5xl mb-4">✉️</div>
                    <h2 class="text-2xl font-bold text-white">আপনার নাম লিখুন</h2>
                    <p class="text-sm text-emerald-300/60">সেলামি খাম খোলার জন্য প্রস্তুত হোন</p>
                </div>
                <input id="userName" type="text" placeholder="এখানে নাম লিখুন..." 
                       class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 text-center focus:ring-2 focus:ring-yellow-500 outline-none text-lg">
                <button onclick="startRaffle()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-[#022c22] font-black py-4 rounded-2xl transition-all transform active:scale-95 shadow-xl">
                    সেলামি খাম খুলুন 🎰
                </button>
            </div>

            <div id="envelope-area" class="hidden flex flex-col items-center">
                <div id="envelope" class="envelope-wrapper">
                    <div class="envelope-top"></div>
                    <div class="envelope-body"></div>
                    <div id="money-card" class="money-card">
                        <span class="text-xs text-green-800 font-bold">BANGLADESH BANK</span>
                        <h2 id="final-amount" class="text-4xl font-black text-green-900">৳ ০</h2>
                    </div>
                </div>
                <div id="winner-text" class="mt-32 text-center opacity-0 transition-opacity duration-500">
                    <h3 class="text-2xl font-bold text-yellow-400">অভিনন্দন, <span id="winner-name"></span>!</h3>
                    <p class="text-emerald-200">আপনার ঈদ সেলামি লিডারবোর্ডে যুক্ত হয়েছে।</p>
                </div>
            </div>
        </div>

        <div class="mt-16">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2 text-yellow-400">
                🏆 সেরা বিজয়ীদের তালিকা
            </h3>
            <div id="leaderboard" class="space-y-3">
                </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
