<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Eid Hadiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-[#011f18] text-white min-h-screen font-['Hind_Siliguri']">

    <div class="max-w-md mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-yellow-500 drop-shadow-lg">🌙 ডিজিটাল ঈদ হাদিয়া</h1>
        </div>

        <div id="action-container" class="slot-machine-frame p-6 rounded-[40px] border-4 border-yellow-600 shadow-2xl bg-gradient-to-b from-yellow-700 via-yellow-500 to-yellow-800">
            <div id="input-view" class="bg-[#011f18] p-8 rounded-[30px] border border-yellow-400/30">
                <h2 class="text-2xl font-bold mb-6 text-center text-yellow-400">আপনার নাম দিন</h2>
                <input id="userName" type="text" placeholder="নাম এখানে লিখুন..." 
                       class="w-full bg-black/40 border border-yellow-500/50 p-4 rounded-xl mb-6 text-center outline-none focus:ring-2 focus:ring-yellow-400 text-white">
                <button onclick="startRoyalSpin()" class="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black py-4 rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all uppercase tracking-tighter">
                    হাদিয়া সংগ্রহ করুন 🎰
                </button>
            </div>

            <div id="slot-view" class="hidden bg-black p-4 rounded-2xl border-4 border-yellow-900 shadow-inner overflow-hidden">
                <div class="slot-window relative h-32 flex justify-center items-center">
                    <div id="slot-reel" class="slot-reel flex flex-col items-center">
                        <div class="num text-yellow-500 text-6xl font-['Bebas_Neue'] tracking-widest">৳000</div>
                    </div>
                    <div class="absolute w-full h-1 bg-red-600/50 top-1/2 -translate-y-1/2"></div>
                </div>
            </div>
        </div>

        <div id="result-view" class="hidden space-y-6">
            <div id="gift-card" class="premium-card p-8 rounded-[30px] border-2 border-yellow-500/30 bg-[#022c22] relative">
                <div class="text-center relative z-10">
                    <h3 class="text-xl font-bold mb-4 text-white">ঈদ মোবারক, <span id="card-name" class="text-yellow-400"></span>!</h3>
                    <div class="bg-black/40 p-6 rounded-2xl mb-6 border border-yellow-500/20">
                        <p class="text-[10px] text-yellow-500 uppercase font-bold mb-1">আপনার হাদিয়া</p>
                        <h4 id="card-amount" class="text-6xl font-['Bebas_Neue'] text-white">৳ 00</h4>
                    </div>
                    <div class="p-5 bg-emerald-950/60 rounded-xl border-l-4 border-yellow-500 text-left">
                        <p id="advice-text" class="text-[14px] leading-relaxed text-emerald-50 text-justify">
                            </p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="downloadCard()" class="bg-white/5 p-4 rounded-xl text-xs font-bold border border-white/10 uppercase tracking-widest">📸 ফটো সেভ</button>
                <button onclick="shareRaffle()" class="bg-yellow-600 p-4 rounded-xl text-black text-xs font-bold uppercase tracking-widest">🔗 শেয়ার করুন</button>
            </div>
        </div>

        <div id="leaderboard" class="mt-12 space-y-2 opacity-60"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
