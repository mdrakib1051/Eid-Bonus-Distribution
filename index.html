<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Eid Hadiya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Hind+Siliguri:wght@400;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-[#011f18] text-white min-h-screen font-['Hind_Siliguri']">

    <div class="max-w-md mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-yellow-500 drop-shadow-lg tracking-tight">🌙 ডিজিটাল ঈদ হাদিয়া</h1>
            <p class="text-emerald-400 text-[10px] tracking-[5px] mt-2 font-black italic">ROYAL RAMADAN EDITION</p>
        </div>

        <div id="action-container" class="glass-card p-10 rounded-[50px] text-center border border-yellow-500/20 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div id="input-view">
                <div class="w-20 h-20 bg-yellow-500/10 rounded-full mx-auto flex items-center justify-center border border-yellow-500/30 mb-6">
                    <span class="text-4xl">🧧</span>
                </div>
                <h2 class="text-2xl font-bold mb-2">সালামি সংগ্রহ করুন</h2>
                <input id="userName" type="text" placeholder="আপনার নাম..." 
                       class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-6 text-center focus:border-yellow-500 outline-none text-lg transition-all">
                <button onclick="startRoyalSpin()" class="w-full bg-gradient-to-b from-yellow-400 to-yellow-600 text-[#011f18] font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-lg uppercase tracking-widest">
                    হাদিয়া গ্রহণ করুন ✨
                </button>
            </div>

            <div id="slot-view" class="hidden py-6">
                <div class="slot-window">
                    <div id="slot-reel" class="slot-reel">
                        <div class="num">৳???</div>
                    </div>
                </div>
                <p class="mt-8 text-yellow-500/80 animate-pulse tracking-widest text-xs font-bold uppercase">তাকদীর নির্ধারিত হচ্ছে...</p>
            </div>
        </div>

        <div id="result-view" class="hidden">
            <div id="gift-card" class="premium-card p-8 rounded-[40px] relative border-2 border-yellow-600/50">
                <div class="text-center relative z-10">
                    <p class="text-yellow-500 font-bold tracking-[3px] text-[9px] mb-4">EID-UL-FITR SPECIAL</p>
                    <h3 class="text-2xl font-bold mb-6 italic text-white">ঈদ মোবারক, <span id="card-name" class="text-yellow-400"></span>!</h3>
                    
                    <div class="amount-box py-8 rounded-3xl mb-8 bg-black/30 border border-white/5">
                        <p class="text-[10px] opacity-50 mb-2 uppercase tracking-widest">প্রাপ্ত হাদিয়া</p>
                        <h4 id="card-amount" class="text-7xl font-['Bebas_Neue'] text-white tracking-wider">৳ 000</h4>
                    </div>

                    <div class="quote-box p-5 rounded-2xl bg-emerald-900/40 border-l-4 border-yellow-500 text-left mb-6">
                        <p class="text-[13px] leading-relaxed italic text-emerald-50">
                            "রমজানের পবিত্রতা আপনার জীবনকে আলোকিত করুক। সিয়াম সাধনার এই উপহার আপনার জন্য ভালোবাসা ও দোয়ার প্রতীক।"
                        </p>
                    </div>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-2 gap-4">
                <button onclick="downloadCard()" class="bg-white/5 border border-white/10 p-4 rounded-2xl flex flex-col items-center gap-2 hover:bg-yellow-500/10 transition-all">
                    <span class="text-xl">📥</span> <span class="text-[10px] font-bold uppercase tracking-widest">Save Photo</span>
                </button>
                <button onclick="shareRaffle()" class="bg-yellow-600 p-4 rounded-2xl flex flex-col items-center gap-2 text-black hover:bg-yellow-500 transition-all">
                    <span class="text-xl">🔗</span> <span class="text-[10px] font-bold uppercase tracking-widest">Share Now</span>
                </button>
            </div>
        </div>

        <div class="mt-12 opacity-80">
            <h3 class="text-yellow-500 font-bold mb-4 text-[10px] tracking-[4px] uppercase text-center italic">উইনার বোর্ড</h3>
            <div id="leaderboard" class="space-y-3"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
