<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Eid Hadiya 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Hind+Siliguri:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#011f18] text-white min-h-screen font-['Hind_Siliguri'] flex flex-col items-center py-10 overflow-x-hidden">

    <div class="w-full max-w-[92%] space-y-12">
        
        <div class="text-center">
            <h1 class="text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 via-yellow-400 to-yellow-700 drop-shadow-2xl italic tracking-tight">
                ঈদ হাদিয়া
            </h1>
            <p class="font-['Cinzel'] text-yellow-600 font-bold tracking-[8px] text-[10px] uppercase mt-3">Royal Edition 2026</p>
        </div>

        <div id="action-container" class="slot-machine-frame p-4 rounded-[55px] border-[8px] border-yellow-600 bg-gradient-to-b from-yellow-700 via-yellow-400 to-yellow-800 shadow-[0_40px_80px_rgba(0,0,0,0.9)]">
            <div id="input-view" class="bg-[#011f18] p-10 rounded-[45px] border border-yellow-500/10 text-center">
                <h2 class="text-xl font-semibold mb-6 text-emerald-100">আপনার নাম দিয়ে <span class="text-yellow-500">হাদিয়া</span> গ্রহণ করুন</h2>
                <input id="userName" type="text" placeholder="এখানে নাম লিখুন..." 
                       class="w-full bg-black/40 border-2 border-yellow-500/10 p-5 rounded-2xl mb-8 text-center outline-none focus:border-yellow-400 text-xl font-bold text-yellow-100">
                <button onclick="startRoyalSpin()" class="w-full bg-gradient-to-r from-yellow-500 to-yellow-300 text-black font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-2xl italic">
                    হাদিয়া নিন 🎰
                </button>
            </div>

            <div id="slot-view" class="hidden bg-black p-6 rounded-[35px] border-[4px] border-[#222] overflow-hidden flex justify-center gap-3">
                <div class="slot-column"><div id="reel1" class="reel"></div></div>
                <div class="slot-column"><div id="reel2" class="reel"></div></div>
                <div class="slot-column"><div id="reel3" class="reel"></div></div>
            </div>
        </div>

        <div id="result-view" class="hidden space-y-10 animate-fade-in">
            <div class="premium-card p-10 rounded-[50px] bg-[#022c22] border-2 border-yellow-500/20 relative flex flex-col items-center">
                <h3 class="font-['Cinzel'] text-sm font-black text-yellow-500 tracking-[5px] mb-4 uppercase">Certificate of Hadiya</h3>
                <h2 class="text-3xl font-bold italic mb-8 text-center leading-tight">ঈদ মোবারক, <span id="card-name" class="text-yellow-400"></span>!</h2>
                
                <div class="w-full bg-black/60 py-10 rounded-[45px] mb-8 border border-yellow-500/10 shadow-inner flex flex-col items-center justify-center">
                    <p class="font-['Cinzel'] text-[9px] text-yellow-500/50 uppercase tracking-[4px] mb-2 font-bold">Total Amount</p>
                    <h4 id="card-amount" class="text-[115px] font-['Bebas_Neue'] text-white leading-none">000</h4>
                    <span class="text-xl font-bold text-yellow-500 mt-4 tracking-[3px]">টাকা মাত্র</span>
                </div>

                <div class="p-7 bg-emerald-950/70 rounded-[30px] border-l-[10px] border-yellow-600">
                    <p id="advice-text" class="text-[14px] leading-relaxed text-emerald-50 text-justify font-medium italic"></p>
                </div>
            </div>

            <div id="svg-cards-container" class="hidden">
                </div>

            <div class="grid grid-cols-2 gap-5 px-2 pb-14">
                <button onclick="downloadSvgCard()" class="bg-white/5 py-5 rounded-2xl text-[12px] font-black border border-white/10 tracking-widest uppercase font-['Cinzel'] text-white shadow-xl flex items-center justify-center gap-2">💾 Download Gift Card</button>
                <button onclick="shareRaffle()" class="bg-yellow-600 py-5 rounded-2xl text-black text-[12px] font-black tracking-widest uppercase font-['Cinzel'] shadow-xl">🔗 SHARE NOW</button>
            </div>
        </div>

        <div id="leaderboard-section" class="pb-20">
            <div class="flex items-center justify-center gap-4 mb-8">
                <span class="h-[1px] w-12 bg-yellow-900"></span>
                <h3 class="text-yellow-700 font-bold tracking-[4px] text-[10px] uppercase font-['Cinzel'] italic">Recent Blessings</h3>
                <span class="h-[1px] w-12 bg-yellow-900"></span>
            </div>
            <div id="leaderboard" class="space-y-4"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
